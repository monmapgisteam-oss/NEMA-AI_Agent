<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>NEMA AI Launcher</title>

<style>
body{
  margin:0;
  overflow:hidden;
  font-family:Arial;
}

#chatBtn{
  position:fixed;
  left:20px;
  bottom:20px;
  width:64px;
  height:64px;
  border-radius:50%;
  border:none;
  cursor:pointer;
  background:#7c4dff;
  color:white;
  font-size:30px;
  box-shadow:0 4px 12px rgba(0,0,0,.35);
  z-index:9999;
}

#chatWindow{
  position:fixed;
  left:20px;
  bottom:95px;
  width:520px;
  height:600px;
  border-radius:18px;
  overflow:hidden;
  display:none;
  box-shadow:0 6px 24px rgba(0,0,0,.4);
  z-index:9999;
  background:white;
}

#chatWindow iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<button id="chatBtn">🤖</button>

<div id="chatWindow">
  <iframe
    src="https://chat.openai.com"
    allow="clipboard-write"
  ></iframe>
</div>

<script>
const btn=document.getElementById("chatBtn");
const win=document.getElementById("chatWindow");

btn.onclick=()=>{
  win.style.display=
    win.style.display==="block"
    ? "none"
    : "block";
};
</script>

</body>
</html>
