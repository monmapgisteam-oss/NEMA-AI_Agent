<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>NEMA AI Launcher</title>

<style>

body{
  margin:0;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

/* Floating button */

#chatBtn{
  position:fixed;
  left:20px;
  bottom:20px;

  width:72px;
  height:72px;

  border:none;
  border-radius:50%;

  cursor:pointer;

  background:#7c4dff;
  color:white;

  font-size:34px;

  box-shadow:0 6px 20px rgba(0,0,0,.35);

  z-index:99999;

  transition:.2s;
}

#chatBtn:hover{
  transform:scale(1.06);
}

</style>
</head>

<body>

<button id="chatBtn">🤖</button>

<script>

document.getElementById("chatBtn").onclick = () => {

  window.open(
    "https://monmapgisteam-oss.github.io/NEMA-AI_Agent/command-center-claude_12.html",
    "NEMA_AI",
    "width=2000,height=700,left=50,top=40"
  );

};

</script>

</body>
</html>
